name: Build Flutter APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب الكود من المستودع
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. تثبيت جافا (نسخة 17 المستقرة والمتوافقة)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. تثبيت لغة فلاتر تلقائياً وتحديد نسخة مستقرة تمنع تضارب كوتلن للاندرويد
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'

      # 4. تحميل حزم ومكتبات المشروع
      - name: Install dependencies
        run: flutter pub get

      # 5. تنظيف الكاش القديم للأندرويد قبل البناء
      - name: Clean Project
        run: flutter clean

      # 🔐 5.5 خطوة فك تشفير وتجهيز ملفات التوقيع الملوكي عبر بايثون (تمنع خطأ invalid input)
      - name: Configure Production Production Keystore
        run: |
          cat << 'EOF' > decode_key.py
          import base64
          import os

          # جلب النص المشفر من أسرار غيت هاب وتمريره بأمان
          secret_data = """${{ secrets.SIGNING_KEY }}"""
          
          # تنظيف النص من أي زيادات وإشارات ويندوز العالقة
          clean_data = "".join(secret_data.split()).replace("-----BEGINCERTIFICATE-----", "").replace("-----ENDCERTIFICATE-----", "")
          
          # فك التشفير وحفظ الملف بالمسار الصحيح
          with open("android/app/upload-keystore.jks", "wb") as f:
              f.write(base64.b64decode(clean_data))
          EOF
          
          # تشغيل سكريبت التنظيف والفك الذكي
          python3 decode_key.py
          
          # توليد ملف كلمات السر المربوط بالـ Gradle
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      # 6. بناء ملف الـ APK النظيف (Release) الموقع رسمياً بمفتاحك
      - name: Build APK
        run: flutter build apk --release

      # 7. رفع ملف الـ APK الناتج بنسخة v4 المدعومة
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: quran-parents-app-apk
          path: build/app/outputs/flutter-apk/app-release.apk