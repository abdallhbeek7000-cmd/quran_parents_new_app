name: Build Flutter APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 🚀 إجبار السيرفر على استخدام نسختك المستقرة لحماية المكتبات
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'

      - name: Create Service Account JSON
        run: |
          mkdir -p assets
          cat << 'EOF' > assets/service-account.json
          ${{ secrets.SERVICE_ACCOUNT_JSON }}
          EOF

      - name: Clean Project
        run: flutter clean

      - name: Install dependencies
        run: |
          rm -f pubspec.lock
          flutter pub get

      - name: Configure Production Production Keystore
        run: |
          cat << 'EOF' > decode_key.py
          import base64
          import os
          secret_data = """${{ secrets.SIGNING_KEY }}"""
          clean_data = "".join(secret_data.split()).replace("-----BEGINCERTIFICATE-----", "").replace("-----ENDCERTIFICATE-----", "")
          with open("android/app/upload-keystore.jks", "wb") as f:
              f.write(base64.b64decode(clean_data))
          EOF
          python3 decode_key.py
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: quran-parents-app-apk
          path: build/app/outputs/flutter-apk/app-release.apk