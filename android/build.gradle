allprojects {
    repositories {
        google()
        mavenCentral()
    }
    // إجبار تحميل مكتبات كوتلن الحديثة
    configurations.all {
        resolutionStrategy.eachDependency { details ->
            if (details.requested.group == 'org.jetbrains.kotlin') {
                details.useVersion "1.9.0"
            }
        }
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}

subprojects {
    project.evaluationDependsOn(':app')
}

// 🚀 الضربة القاضية: إجبار المترجم نفسه على استخدام لغة 1.9
subprojects {
    afterEvaluate { project ->
        if (project.hasProperty('android')) {
            project.android {
                if (namespace == null) {
                    namespace project.group
                }
                compileOptions {
                    sourceCompatibility JavaVersion.VERSION_1_8
                    targetCompatibility JavaVersion.VERSION_1_8
                }
            }
        }
        
        // استهداف مهام كوتلن حصراً وتغيير لغتها بالقوة
        if (project.plugins.hasPlugin('kotlin-android') || project.plugins.hasPlugin('kotlin')) {
            project.tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
                kotlinOptions {
                    jvmTarget = "1.8"
                    languageVersion = "1.9" // 🎯 هذا السطر يقتل الخطأ الخاص بك تماماً
                }
            }
        }
    }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}